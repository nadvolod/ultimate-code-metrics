name: AI PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for diff

      - name: Start Temporal
        run: |
          # Use temporalite for a self-contained Temporal server with embedded storage
          curl -sSf https://temporal.download/cli.sh | sh
          ~/.temporalio/bin/temporal server start-dev --headless &

          echo "Waiting for Temporal to be ready..."
          for i in {1..30}; do
            if ~/.temporalio/bin/temporal operator cluster health 2>/dev/null | grep -q SERVING; then
              echo "Temporal is ready!"
              exit 0
            fi
            echo "Attempt $i: Temporal not ready yet, waiting..."
            sleep 3
          done

          echo "Temporal failed to start"
          exit 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Java module
        run: mvn -pl temporal-review compile -q
        working-directory: java

      - name: Generate review input
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          chmod +x scripts/generate-review-input.sh
          ./scripts/generate-review-input.sh \
            "$PR_NUMBER" \
            "$PR_TITLE" \
            "$PR_AUTHOR" \
            "$PR_BASE_SHA" \
            "$PR_HEAD_SHA" \
            /tmp/review-input.json
        working-directory: ${{ github.workspace }}

      - name: Run PR Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mvn -pl temporal-review exec:java \
            -Dexec.mainClass="com.utm.temporal.WorkerApp" \
            -Dexec.args="/tmp/review-input.json /tmp/review-output.json"
        working-directory: java

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = JSON.parse(fs.readFileSync('/tmp/review-output.json', 'utf8'));
            const marker = '<!-- UTM_AI_REVIEW -->';

            // --- Emoji mappings ---
            const agentIcons = {
              'Code Quality': '🔍', 'CodeQuality': '🔍',
              'Test Quality': '🧪', 'TestQuality': '🧪',
              'Security': '🔒',
              'Complexity': '📐',
              'Priority': '🎯',
            };
            const riskEmoji = { HIGH: '🔴', MEDIUM: '🟡', LOW: '🟢' };
            const recEmoji  = { BLOCK: '🔴', REQUEST_CHANGES: '🟡', APPROVE: '🟢' };
            const verdictCallout = { APPROVE: 'TIP', REQUEST_CHANGES: 'WARNING', BLOCK: 'CAUTION' };
            const verdictLabel  = { APPROVE: 'Approved', REQUEST_CHANGES: 'Changes Requested', BLOCK: 'Blocked' };

            function icon(name) { return agentIcons[name] || '📋'; }

            function fmtTime(iso) {
              if (!iso) return 'N/A';
              try { return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }); }
              catch { return iso; }
            }

            function fmtDur(ms) {
              if (!ms && ms !== 0) return 'N/A';
              return ms >= 1000 ? `${(ms / 1000).toFixed(1)}s` : `${ms}ms`;
            }

            function fmtCost(cost) {
              if (cost === null || cost === undefined) return null;
              if (cost === 0) return null;
              return cost < 0.01 ? `$${cost.toFixed(4)}` : `$${cost.toFixed(2)}`;
            }

            // --- Build comment ---
            const overall = output.overallRecommendation || 'REQUEST_CHANGES';
            const agents = output.agents || [];
            const meta = output.metadata || {};
            const L = [];

            // Verdict banner
            L.push(marker, '');
            L.push(`> [!${verdictCallout[overall] || 'NOTE'}]`);
            L.push(`> ## Ultimate Code Metrics Review`);
            L.push(`> **Verdict: ${verdictLabel[overall] || overall}** ${recEmoji[overall] || ''}`);
            L.push('');

            // Summary table
            L.push('### Walkthrough', '');
            L.push('| Agent | Risk | Recommendation | Findings |');
            L.push('|:------|:----:|:--------------:|:--------:|');
            for (const a of agents) {
              const f = (a.findings || []).length;
              L.push(`| ${icon(a.agentName)} ${a.agentName} | ${riskEmoji[a.riskLevel] || ''} ${a.riskLevel || 'N/A'} | ${recEmoji[a.recommendation] || ''} ${a.recommendation || 'N/A'} | ${f} |`);
            }
            L.push('', '---', '');

            // Collapsible details per agent
            for (const a of agents) {
              const findings = a.findings || [];
              const count = findings.length === 1 ? '1 finding' : `${findings.length} findings`;
              L.push(`<details>`);
              L.push(`<summary>${icon(a.agentName)} <strong>${a.agentName}</strong> — ${riskEmoji[a.riskLevel] || ''} ${a.riskLevel || 'N/A'} risk · ${count}</summary>`);
              L.push('');
              L.push(`> **Recommendation:** ${recEmoji[a.recommendation] || ''} ${a.recommendation || 'N/A'}`);
              L.push('');
              if (findings.length === 0) {
                L.push('_No findings._');
              } else {
                for (const f of findings) { L.push(`- ${f}`); }
              }
              L.push('', '</details>', '');
            }

            // Footer with cost
            L.push('---', '');
            const ts = fmtTime(meta.generatedAt);
            const dur = fmtDur(meta.tookMs);
            const model = meta.model || 'unknown';
            const cost = fmtCost(meta.estimatedCost);
            const costPart = cost ? ` · Cost: ${cost}` : '';
            L.push(
              `<sub>Generated by <strong>Ultimate Code Metrics</strong> at ${ts} · ` +
              `Took ${dur} · Model: ${model}${costPart} · ` +
              `<a href="https://v0-ultimatetestmetrics.vercel.app/dashboard">📊 Dashboard</a></sub>`
            );

            const body = L.join('\n');

            // --- Find existing comment or create new ---
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Persist Review to Dashboard
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          jq --arg pr "$PR_NUMBER" \
             --arg title "$PR_TITLE" \
             --arg author "$PR_AUTHOR" \
             '. + {prNumber: ($pr | tonumber), prTitle: $title, author: $author}' \
             /tmp/review-output.json > "data/reviews/review-${PR_NUMBER}.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "data/reviews/review-${PR_NUMBER}.json"
          git commit -m "chore: add review data for PR #${PR_NUMBER}"
          git push origin "HEAD:${HEAD_REF}"
